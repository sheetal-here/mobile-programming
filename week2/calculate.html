<!DOCTYPE html>
<html>

<head>
    <title>Simple Calculator</title>

    <script src="calculate.js"></script>
</head>

<body>

    <h2>Simple Calculator</h2>

    Number 1:
    <input type="number" id="n1">
    <br><br>

    Number 2:
    <input type="number" id="n2">
    <br><br>

    <button onclick="add()">
        Add +
    </button>

    <button onclick="subtract()">
        Subtract -
    </button>

    <button onclick="multiply()">
        Multiply *
    </button>

    <button onclick="divide()">
        Divide /
    </button>

    <h3 id="result"></h3>

</body>

</html>

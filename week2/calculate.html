<!DOCTYPE html>
<html>

<head>
    <title>Simple Calculator</title>
</head>

<body>

    <h1>Simple Calculator</h1>

    Number 1:
    <input type="number" id="n1">

    <br><br>

    Number 2:
    <input type="number" id="n2">

    <br><br>

    <button onclick="calculate('+')">
        ADD (+)
    </button>

    <button onclick="calculate('-')">
        SUBTRACT (-)
    </button>

    <button onclick="calculate('*')">
        MULTIPLY (*)
    </button>

    <button onclick="calculate('/')">
        DIVIDE (/)
    </button>

    <h2 id="result"></h2>

    <script src="calculate.js"></script>
</body>

</html>

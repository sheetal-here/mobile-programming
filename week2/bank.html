<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Bank System</title>
</head>

<body>

    <h1>Simple Bank System</h1>

    <h2 id="balance">Current Balance: Rs. 10000</h2>

    <p><b>Rule:</b> Amount must be a multiple of 100.</p>

    <!-- Buttons First -->
    <button onclick="showWithdraw()">Withdraw</button>

    <button onclick="showDeposit()">Deposit</button>

    <br><br>

    <!-- Input Field Hidden Initially -->
    <div id="inputSection" style="display: none;">

        <input type="number" id="amount" placeholder="Enter Amount">

        <button onclick="submitTransaction()">Submit</button>

    </div>

    <script src="bank.js"></script>

</body>

</html>

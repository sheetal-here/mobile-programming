<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>ATM Machine</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- Main Heading -->
    <h1>ATM Machine</h1>

    <!-- Balance Section -->
    <h2>

        <span id="balance">

            Current Balance: ******

        </span>

        <!-- Eye Button -->
        <button onclick="toggleBalance()"
            id="eyeIcon">

            <i class="fa-solid fa-eye-slash"></i>

        </button>

    </h2>

    <!-- Rules -->
    <p>

        <b>Rule:</b>

        Amount must be a multiple of 100.

    </p>

    <!-- Buttons -->
    <button onclick="showWithdraw()">

        Withdraw

    </button>

    <button onclick="showDeposit()">

        Deposit

    </button>

    <br><br>

    <!-- Hidden Input Section -->
    <div id="inputSection"
        style="display: none;">

        <!-- Transaction Title -->
        <h3 id="transactionTitle">

        </h3>

        <!-- Amount Input -->
        <input type="number"
            id="amount"
            placeholder="Enter Amount">

        <!-- Submit Button -->
        <button onclick="submitTransaction()">

            Submit

        </button>

    </div>

    <!-- JavaScript File -->
    <script src="bank.js"></script>

</body>

</html>
